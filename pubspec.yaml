name: run_ville
description: "Production-ready Flutter starter for Run Ville."
publish_to: "none" #
version: 1.0.0+1

environment:
  sdk: ^3.7.2
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^17.0.0
  flutter_dotenv: ^6.0.0
  supabase_flutter: ^2.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.5.4

flutter:
  uses-material-design: true

  assets:
    - assets/env/.env.dev
    - assets/env/.env.prod
    - .env
